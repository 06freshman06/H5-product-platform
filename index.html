<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>郴州商用厨具酒店家具</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header" id="header">
  <div class="header-inner">
    <div class="logo" id="logo-area" onclick="goHome()">
      <img id="logo-img" class="logo-img hidden" src="" alt="logo">
      <span id="logo-text">🏪 郴州厨具家具</span>
    </div>
    <div class="header-right">
      <span class="phone-btn" onclick="callPhone()">📞 电话</span>
      <span class="admin-entrance" onclick="openAdmin()">管理</span>
    </div>
  </div>
</header>

<!-- 首页 -->
<div class="page" id="page-home">
  <div class="hero">
    <img id="hero-bg-img" class="hero-bg-img" src="" alt="">
    <div class="hero-bg-overlay"></div>
    <div class="hero-content">
      <div class="hero-title-row">
        <img id="hero-logo" class="hero-logo hidden" src="" alt="logo">
        <h1 id="hero-title">郴州商用厨具·酒店家具</h1>
      </div>
      <p id="hero-slogan">15年行业经验 · 500+客户信赖 · 正品保障</p>
      <div class="hero-btns">
        <button class="btn btn-white" onclick="switchPage('products')">查看产品</button>
        <button class="btn btn-outline-white" onclick="switchPage('cases')">成功案例</button>
      </div>
    </div>
  </div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="quick-entry">
    <div class="section-title">快捷入口</div>
    <div class="quick-grid">
      <div class="quick-item" onclick="switchPage('products')"><span>🍳</span><span>厨具设备</span></div>
      <div class="quick-item" onclick="switchPage('products')"><span>🪑</span><span>酒店家具</span></div>
      <div class="quick-item" onclick="switchPage('cases')"><span>📋</span><span>方案案例</span></div>
      <div class="quick-item" onclick="switchPage('knowledge')"><span>📖</span><span>避坑知识</span></div>
      <div class="quick-item" onclick="switchPage('contact')"><span>📍</span><span>到店导航</span></div>
      <div class="quick-item" onclick="openInquiry()"><span>💬</span><span>在线询价</span></div>
    </div>
  </div>
  <div class="section">
    <div class="section-header"><div class="section-title">🔥 热门产品</div><span class="section-more" onclick="switchPage('products')">查看全部 ›</span></div>
    <div class="product-scroll" id="home-products"></div>
  </div>
  <div class="section">
    <div class="section-header"><div class="section-title">🏆 精选案例</div><span class="section-more" onclick="switchPage('cases')">查看全部 ›</span></div>
    <div id="home-cases"></div>
  </div>
  <div class="section">
    <div class="section-header"><div class="section-title">📚 避坑知识</div><span class="section-more" onclick="switchPage('knowledge')">查看全部 ›</span></div>
    <div id="home-knowledge"></div>
  </div>
</div>

<!-- 产品中心 -->
<div class="page hidden" id="page-products">
  <div class="page-header"><button class="back-btn" onclick="goHome()">‹</button><span>产品中心</span></div>
  <div class="category-tabs" id="category-tabs"></div>
  <div class="search-bar"><input type="text" id="search-input" placeholder="搜索产品名称..." oninput="filterProducts()"></div>
  <div class="product-list" id="products-list"></div>
  <div class="empty-tip" id="products-empty" style="display:none">暂无产品</div>
</div>

<!-- 产品详情 -->
<div class="page hidden" id="page-product-detail">
  <div class="page-header"><button class="back-btn" onclick="switchPage('products')">‹</button><span>产品详情</span></div>
  <div id="product-detail-content"></div>
</div>

<!-- 方案案例 -->
<div class="page hidden" id="page-cases">
  <div class="page-header"><button class="back-btn" onclick="goHome()">‹</button><span>方案案例</span></div>
  <div class="case-list" id="cases-list"></div>
  <div class="empty-tip" id="cases-empty" style="display:none">暂无案例</div>
</div>

<!-- 案例详情 -->
<div class="page hidden" id="page-case-detail">
  <div class="page-header"><button class="back-btn" onclick="switchPage('cases')">‹</button><span>案例详情</span></div>
  <div id="case-detail-content"></div>
</div>

<!-- 避坑知识 -->
<div class="page hidden" id="page-knowledge">
  <div class="page-header"><button class="back-btn" onclick="goHome()">‹</button><span>避坑知识</span></div>
  <div class="knowledge-list" id="knowledge-list"></div>
  <div class="empty-tip" id="knowledge-empty" style="display:none">暂无文章</div>
</div>

<!-- 知识详情 -->
<div class="page hidden" id="page-knowledge-detail">
  <div class="page-header"><button class="back-btn" onclick="switchPage('knowledge')">‹</button><span>文章详情</span></div>
  <div id="knowledge-detail-content"></div>
</div>

<!-- 联系我们 -->
<div class="page hidden" id="page-contact">
  <div class="page-header"><button class="back-btn" onclick="goHome()">‹</button><span>联系我们</span></div>
  <div class="contact-page">
    <div class="contact-card">
      <div class="contact-item" onclick="callPhone()">
        <span class="contact-icon">📞</span>
        <div><div class="contact-label">联系电话</div><div class="contact-value" id="contact-phone">13800000000</div></div>
        <span class="contact-action">拨打</span>
      </div>
      <div class="contact-item" onclick="copyWechat()">
        <span class="contact-icon">💬</span>
        <div><div class="contact-label">微信咨询</div><div class="contact-value" id="contact-wechat">点击复制微信号</div></div>
        <span class="contact-action">复制</span>
      </div>
      <div class="contact-item" onclick="openMap()">
        <span class="contact-icon">📍</span>
        <div><div class="contact-label">门店地址</div><div class="contact-value" id="contact-address">点击查看地图</div></div>
        <span class="contact-action">导航</span>
      </div>
    </div>
    <div class="inquiry-form-section">
      <div class="section-title">📝 在线询价</div>
      <form id="inquiry-form" onsubmit="submitInquiry(event)">
        <input type="text" placeholder="您的称呼*" id="inq-name" required>
        <input type="tel" placeholder="联系电话*" id="inq-phone" required>
        <select id="inq-type" required>
          <option value="">需求类型*</option>
          <option value="厨具设备">厨具设备</option>
          <option value="酒店家具">酒店家具</option>
          <option value="整套方案">整套方案</option>
          <option value="其他">其他</option>
        </select>
        <input type="text" placeholder="店铺面积（如：100㎡）" id="inq-area">
        <textarea placeholder="具体需求描述..." id="inq-desc" rows="3"></textarea>
        <button type="submit" class="btn btn-primary btn-block">提交询价</button>
      </form>
    </div>
  </div>
</div>

<!-- 底部导航 -->
<nav class="tabbar" id="tabbar">
  <div class="tabbar-item active" data-page="home" onclick="switchPage('home')"><span class="tab-icon">🏠</span><span class="tab-label">首页</span></div>
  <div class="tabbar-item" data-page="products" onclick="switchPage('products')"><span class="tab-icon">📦</span><span class="tab-label">产品</span></div>
  <div class="tabbar-item" data-page="cases" onclick="switchPage('cases')"><span class="tab-icon">📋</span><span class="tab-label">案例</span></div>
  <div class="tabbar-item" data-page="knowledge" onclick="switchPage('knowledge')"><span class="tab-icon">📖</span><span class="tab-label">知识</span></div>
  <div class="tabbar-item" data-page="contact" onclick="switchPage('contact')"><span class="tab-icon">📞</span><span class="tab-label">联系</span></div>
</nav>

<!-- 询价弹窗 -->
<div class="modal-overlay hidden" id="inquiry-modal">
  <div class="modal">
    <div class="modal-header">在线询价</div>
    <form id="inquiry-form-modal" onsubmit="submitInquiryModal(event)">
      <input type="text" placeholder="您的称呼*" id="inq-name2" required>
      <input type="tel" placeholder="联系电话*" id="inq-phone2" required>
      <select id="inq-type2" required>
        <option value="">需求类型*</option>
        <option value="厨具设备">厨具设备</option>
        <option value="酒店家具">酒店家具</option>
        <option value="整套方案">整套方案</option>
        <option value="其他">其他</option>
      </select>
      <input type="text" placeholder="店铺面积（如：100㎡）" id="inq-area2">
      <textarea placeholder="具体需求描述..." id="inq-desc2" rows="3"></textarea>
      <div class="modal-btns">
        <button type="button" class="btn-gray" onclick="closeInquiry()">取消</button>
        <button type="submit" class="btn btn-primary">提交</button>
      </div>
    </form>
  </div>
</div>

<div class="safe-bottom"></div>
<script src="db.js"></script>
<script src="app.js"></script>
</body>
</html>
